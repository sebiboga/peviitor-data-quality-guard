name: Validate Jobs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      # ==================== PASUL 1: EXTRACT JOB ====================
      - name: PASUL 1 - Extract job from Solr
        id: pasul1
        run: |
          echo "=== PASUL 1: EXTRACT JOB ==="
          TODAY=$(date +%Y-%m-%d)
          echo "Today: $TODAY"
          
          curl -g -s "https://solr.peviitor.ro/solr/job/select?q=*:*&fl=url,title,company,vdate,location,date,status&wt=json&rows=1&sort=vdate+asc" \
            -u "$SOLR_AUTH" -o /tmp/solr_response.json
          
          cat /tmp/solr_response.json
          
          python3 extract_job.py /tmp/solr_response.json
          
          echo "=== PASUL 1 COMPLETE ==="

      # ==================== PASUL 2.1: TEST URL ====================
      - name: PASUL 2.1 - test_url.md (ACTIVE/EXPIRED)
        id: pasul21
        if: steps.pasul1.outcome == 'success'
        run: |
          echo "=== PASUL 2.1: TEST URL ==="
          JOB_URL=$(cat /tmp/job_url.txt)
          echo "URL: $JOB_URL"
          
          node test_url.js
          
          URL_STATUS=$(cat /tmp/url_status.txt)
          echo "STATUS: $URL_STATUS"
          
          # For SKIP (OLX/Publi24): continue validation without delete
          if [ "$URL_STATUS" = "SKIP" ]; then
              echo "SKIPPED (OLX/Publi24) - continue validation"
          elif [ "$URL_STATUS" = "EXPIRED" ] || [ "$URL_STATUS" = "NOT_A_JOB" ]; then
              echo "=== DELETE JOB ==="
              curl -g -u "$SOLR_AUTH" -X POST -H "Content-Type: application/json" \
                "https://solr.peviitor.ro/solr/job/update?commit=true" \
                -d "{\"delete\": [\"$JOB_URL\"]}"
              echo "Job deleted"
          fi
          
          echo "=== PASUL 2.1 COMPLETE ==="

      # ==================== RESULT ====================
      - name: Result
        if: always()
        run: |
          echo "=========================================="
          echo "RESULT:"
          echo "PASUL 1: Success"
          echo "PASUL 2.1: $(cat /tmp/url_status.txt 2>/dev/null || echo 'NOT RUN')"
          echo "Job: $(cat /tmp/job_url.txt 2>/dev/null || echo 'NONE')"
          echo "=========================================="
