name: Validate Jobs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install -g puppeteer@latest

      - name: Create validation script
        run: |
          cat > validate_url.js << 'EOF'
          const puppeteer = require('puppeteer');

          async function validateUrl(url) {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            try {
              await page.goto(url, {timeout: 15000});
              await new Promise(r => setTimeout(r, 3000));
              const text = await page.evaluate(() => document.body.innerText);
              const expired = ['no longer available','expired','404','job filled','ocupat','închis','similar jobs','joburi similare']
                .some(i => text.toLowerCase().includes(i));
              await browser.close();
              return expired ? 'EXPIRED' : 'ACTIVE';
            } catch(e) {
              await browser.close();
              return 'ERROR: ' + e.message;
            }
          }

          async function main() {
            const url = process.argv[2];
            if (!url) {
              console.log('Usage: node validate_url.js <URL>');
              process.exit(1);
            }
            const result = await validateUrl(url);
            console.log(result);
          }

          main();
          EOF'

      - name: Install OpenCode
        run: npm install -g @opencode-ai/opencode

      - name: Get 1 job
        run: |
          curl -g "https://solr.peviitor.ro/solr/job/select?q=*:*&sort=vdate+asc&fl=*&wt=json&rows=1" \
            -u "$SOLR_AUTH" -o /tmp/jobs.json
          cat /tmp/jobs.json

      - name: Create prompt for OpenCode
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "HEY OPENCODE!" > /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "Today: $TODAY" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "Jobs: /tmp/jobs.json" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "YOUR TASK:" >> /tmp/prompt.txt
          echo "For EACH job:" >> /tmp/prompt.txt
          echo "1. Read vdate" >> /tmp/prompt.txt
          echo "2. IF vdate starts with '$TODAY' → SKIP (don't test)" >> /tmp/prompt.txt
          echo "3. ELSE → TEST using tests/*.md" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "KEEP IT SIMPLE:" >> /tmp/prompt.txt
          echo "- Skip if vdate=$TODAY" >> /tmp/prompt.txt
          echo "- Test if vdate≠$TODAY" >> /tmp/prompt.txt
          echo "- Process ONE BY ONE" >> /tmp/prompt.txt
          cat /tmp/prompt.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: batch
          path: |
            /tmp/jobs.json
            /tmp/prompt.txt
          retention-days: 7

      - name: Run OpenCode to process job
        run: |
          opencode --non-interactive -f /tmp/prompt.txt
