name: Validate Jobs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      # ==================== PASUL 1: EXTRACT JOB ====================
      - name: PASUL 1 - Extract job from Solr
        id: pasul1
        run: |
          echo "=== PASUL 1: EXTRACT JOB ==="
          TODAY=$(date +%Y-%m-%d)
          echo "Today: $TODAY"
          
          curl -g -s "https://solr.peviitor.ro/solr/job/select?q=*:*&fl=url,title,company,vdate,location,date,status&wt=json&rows=1&sort=vdate+asc" \
            -u "$SOLR_AUTH" -o /tmp/solr_response.json
          
          cat /tmp/solr_response.json
          
          python3 extract_job.py /tmp/solr_response.json
          
          echo "=== PASUL 1 COMPLETE ==="

      # ==================== PASUL 2.1: TEST URL ====================
      - name: PASUL 2.1 - test_url.md (ACTIVE/EXPIRED)
        id: pasul21
        if: steps.pasul1.outcome == 'success'
        run: |
          echo "=== PASUL 2.1: TEST URL ==="
          JOB_URL=$(cat /tmp/job_url.txt)
          echo "URL: $JOB_URL"
          
          node test_url.js
          
          URL_STATUS=$(cat /tmp/url_status.txt)
          echo "STATUS: $URL_STATUS"
          
          # Handle OLX/Publi24 KEEP: set vdate=today with FULL PUSH, skip further validation
          if [ "$URL_STATUS" = "OLX_KEEP" ]; then
              echo "=== OLX/Publi24 KEEP: Set vdate=today ==="
              TODAY=$(date +%Y-%m-%d)
              # Get current job data and add vdate with FULL PUSH
              curl -g -s -u "$SOLR_AUTH" \
                "https://solr.peviitor.ro/solr/job/select?q=url:$(python3 -c "import urllib.parse; print(urllib.parse.quote('$JOB_URL'))")&fl=*&wt=json&rows=1" \
                -o /tmp/job_olx.json"
              
              python3 -c "
              import json, sys
              with open('/tmp/job_olx.json') as f:
                  data = json.load(f)
              if data['response']['numFound'] > 0:
                  doc = data['response']['docs'][0]
                  # Remove internal Solr fields
                  for key in ['_version_', '_root_']:
                      doc.pop(key, None)
                  doc['vdate'] = '$TODAYT00:00:00Z'
                  print('Updating with FULL PUSH...')
                  with open('/tmp/job_olx_full.json', 'w') as out:
                      json.dump([doc], out)
              "
              
              curl -g -u "$SOLR_AUTH" -X POST -H "Content-Type: application/json" \
                "https://solr.peviitor.ro/solr/job/update?commit=true" \
                -d @/tmp/job_olx_full.json"
              
              echo "OLX/Publi24 job updated with vdate=$TODAY - SKIP further validation"
              echo "OLX_KEEP" > /tmp/url_status.txt"
           elif [ "$URL_STATUS" = "EXPIRED" ] || [ "$URL_STATUS" = "NOT_A_JOB" ]; then
              echo "=== DELETE JOB ==="
              curl -g -u "$SOLR_AUTH" -X POST -H "Content-Type: application/json" \
                "https://solr.peviitor.ro/solr/job/update?commit=true" \
                -d "{\"delete\": [\"$JOB_URL\"]}"
              echo "Job deleted"
          fi
          
          echo "=== PASUL 2.1 COMPLETE ==="

      # ==================== RESULT ====================
      - name: Result
        if: always()
        run: |
          echo "=========================================="
          echo "RESULT:"
          echo "PASUL 1: Success"
          echo "PASUL 2.1: $(cat /tmp/url_status.txt 2>/dev/null || echo 'NOT RUN')"
          echo "Job: $(cat /tmp/job_url.txt 2>/dev/null || echo 'NONE')"
          echo "=========================================="
