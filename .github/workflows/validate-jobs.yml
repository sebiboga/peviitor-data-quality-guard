name: Validate Jobs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install -g puppeteer@latest

      - name: Create validation script
        run: |
          echo "const puppeteer = require('puppeteer');" > validate_url.js
          echo "" >> validate_url.js
          echo "async function validateUrl(url) {" >> validate_url.js
          echo "  const browser = await puppeteer.launch({" >> validate_url.js
          echo "    headless: true," >> validate_url.js
          echo "    args: ['--no-sandbox', '--disable-setuid-sandbox']" >> validate_url.js
          echo "  });" >> validate_url.js
          echo "  const page = await browser.newPage();" >> validate_url.js
          echo "  try {" >> validate_url.js
          echo "    await page.goto(url, {timeout: 15000});" >> validate_url.js
          echo "    await new Promise(r => setTimeout(r, 3000));" >> validate_url.js
          echo "    const text = await page.evaluate(() => document.body.innerText);" >> validate_url.js
          echo "    const expired = ['no longer available','expired','404','job filled','ocupat','închis','similar jobs','joburi similare']" >> validate_url.js
          echo "      .some(i => text.toLowerCase().includes(i));" >> validate_url.js
          echo "    await browser.close();" >> validate_url.js
          echo "    return expired ? 'EXPIRED' : 'ACTIVE';" >> validate_url.js
          echo "  } catch(e) {" >> validate_url.js
          echo "    await browser.close();" >> validate_url.js
          echo "    return 'ERROR: ' + e.message;" >> validate_url.js
          echo "  }" >> validate_url.js
          echo "}" >> validate_url.js
          echo "" >> validate_url.js
          echo "async function main() {" >> validate_url.js
          echo "  const url = process.argv[2];" >> validate_url.js
          echo "  if (!url) {" >> validate_url.js
          echo "    console.log('Usage: node validate_url.js <URL>');" >> validate_url.js
          echo "    process.exit(1);" >> validate_url.js
          echo "  }" >> validate_url.js
          echo "  const result = await validateUrl(url);" >> validate_url.js
          echo "  console.log(result);" >> validate_url.js
          echo "}" >> validate_url.js
          echo "" >> validate_url.js
          echo "main();" >> validate_url.js
          cat validate_url.js

      - name: Get 1 job
        run: |
          curl -g "https://solr.peviitor.ro/solr/job/select?q=*:*&sort=vdate+asc&fl=*&wt=json&rows=1" \
            -u "$SOLR_AUTH" -o /tmp/jobs.json
          cat /tmp/jobs.json

      - name: Create prompt for OpenCode
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "HEY OPENCODE!" > /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "Today: $TODAY" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "Jobs: /tmp/jobs.json" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "YOUR TASK:" >> /tmp/prompt.txt
          echo "For EACH job:" >> /tmp/prompt.txt
          echo "1. Read vdate" >> /tmp/prompt.txt
          echo "2. IF vdate starts with '$TODAY' → SKIP (don't test)" >> /tmp/prompt.txt
          echo "3. ELSE → TEST using tests/*.md" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "KEEP IT SIMPLE:" >> /tmp/prompt.txt
          echo "- Skip if vdate=$TODAY" >> /tmp/prompt.txt
          echo "- Test if vdate≠$TODAY" >> /tmp/prompt.txt
          echo "- Process ONE BY ONE" >> /tmp/prompt.txt
          cat /tmp/prompt.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: batch
          path: |
            /tmp/jobs.json
            /tmp/prompt.txt
          retention-days: 7
