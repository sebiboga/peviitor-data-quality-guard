name: Validate Jobs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      # ==================== PASUL 1: EXTRAGE UN JOB DIN SOLR ====================
      - name: PASUL 1 - Extrage job din Solr
        id: pasul1
        run: |
          echo "=== PASUL 1: EXTRAGE UN JOB DIN SOLR ==="
          TODAY=$(date +%Y-%m-%d)
          echo "Data de azi: $TODAY"
          echo ""

          # Salvează răspunsul Solr într-un fișier
          curl -g -s "https://solr.peviitor.ro/solr/job/select?q=*:*&fl=url,title,company,vdate,location,date,status&wt=json&rows=1" \
            -u "$SOLR_AUTH" -o /tmp/solr_response.json

          echo "Răspunsul de la Solr:"
          cat /tmp/solr_response.json
          echo ""

          # Rulează scriptul Python din repo
          TODAY=$TODAY python3 extract_job.py /tmp/solr_response.json

          echo ""
          echo "=== PASUL 1 COMPLET ==="
      
      # ==================== PAUZĂ 2 minute (prin job separation) ====================
      - name: PAUZĂ 2 minute
        run: |
          echo "PAUZĂ 2 minute înainte de PASUL 2.1..."
          sleep 120
      
      # ==================== PASUL 2.1: TEST_URL.MD (VALIDARE URL) ====================
      - name: PASUL 2.1 - test_url.md (ACTIVE/EXPIRED)
        id: pasul21
        if: steps.pasul1.outcome == 'success'
        run: |
          echo "=== PASUL 2.1: TEST_URL.MD (VALIDARE URL) ==="
          JOB_URL=$(cat /tmp/job_url.txt)
          echo "URL de testat: $JOB_URL"
          echo ""

          # Rulează test_url.md cu Puppeteer (MANDATORY înainte de orice DELETE)
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
              const browser = await puppeteer.launch({headless: true, args: ['--no-sandbox', '--disable-setuid-sandbox']});
              const page = await browser.newPage();
              try {
                  console.log('DESCHID PAGINA CU PUPPETEER...');
                  await page.goto('$JOB_URL', {timeout: 15000});
                  await new Promise(r => setTimeout(r, 3000));
                  const text = await page.evaluate(() => document.body.innerText);

                  const expiredKeywords = ['no longer available','expired','404','job filled','ocupat','închis','similar jobs','joburi similare','anunt expirat','locul nu mai este disponibil','oferta a expirat'];
                  const isExpired = expiredKeywords.some(i => text.toLowerCase().includes(i));

                  const isJob = text.toLowerCase().includes('responsabilit') || 
                               text.toLowerCase().includes('requirement') || 
                               text.toLowerCase().includes('apply') ||
                               text.toLowerCase().includes('candidat');

                  if (isExpired) {
                      console.log('REZULTAT: EXPIRED');
                      console.log('DECIZIE: DELETE din Solr');
                      require('fs').writeFileSync('/tmp/url_status.txt', 'EXPIRED');
                  } else if (isJob) {
                      console.log('REZULTAT: ACTIVE');
                      console.log('DECIZIE: Continuă validarea');
                      require('fs').writeFileSync('/tmp/url_status.txt', 'ACTIVE');
                  } else {
                      console.log('REZULTAT: NOT_A_JOB');
                      console.log('DECIZIE: DELETE din Solr');
                      require('fs').writeFileSync('/tmp/url_status.txt', 'NOT_A_JOB');
                  }
              } catch (e) {
                  if (e.message.includes('404') || e.message.includes('net::ERR')) {
                      console.log('REZULTAT: EXPIRED (404/Network Error)');
                      console.log('DECIZIE: DELETE din Solr');
                      require('fs').writeFileSync('/tmp/url_status.txt', 'EXPIRED');
                  } else {
                      console.log('EROARE:', e.message);
                      require('fs').writeFileSync('/tmp/url_status.txt', 'ERROR');
                  }
              } finally {
                  await browser.close();
              }
          })();
          "

          URL_STATUS=$(cat /tmp/url_status.txt)
          echo ""
          echo "STATUS FINAL: $URL_STATUS"

          # Dacă e EXPIRED sau NOT_A_JOB → DELETE din Solr
          if [ "$URL_STATUS" = "EXPIRED" ] || [ "$URL_STATUS" = "NOT_A_JOB" ]; then
              echo ""
              echo "=== ȘTERG JOB DIN SOLR ==="
              curl -g -u "$SOLR_AUTH" -X POST -H "Content-Type: application/json" \
                "https://solr.peviitor.ro/solr/job/update?commit=true" \
                -d "{\"delete\": [\"$JOB_URL\"]}"

              echo ""
              echo "=== VERIFICĂ ȘTERGEREA (test_deleted_url.md) ==="
              # Folosim grep pentru verificare simplă
              RESP=$(curl -g -s -u "$SOLR_AUTH" \
                "https://solr.peviitor.ro/solr/job/select?q=url:$(python3 -c "import urllib.parse; print(urllib.parse.quote('$JOB_URL'))")&wt=json&rows=1")
              
              if echo "$RESP" | grep -q '"numFound":0'; then
                echo "VERIFICARE: Job șters cu succes din Solr"
              else
                echo "EROARE: Job încă în Solr sau eroare!"
                echo "$RESP"
              fi
          fi

          echo ""
          echo "=== PASUL 2.1 COMPLET ==="

      # ==================== AFIȘEAZĂ REZULTATUL FINAL ====================
      - name: Rezultat final
        if: always()
        run: |
          echo "=========================================="
          echo "REZULTAT FINAL PENTRU ACEST RUN:"
          echo "=========================================="
          echo "PASUL 1: Job extras din Solr"
          echo "PASUL 2.1: test_url.md → $(cat /tmp/url_status.txt 2>/dev/null || echo 'NU S-A RULAT')"
          echo ""
          if [ -f /tmp/job_url.txt ]; then
            echo "Job procesat: $(cat /tmp/job_url.txt)"
          fi
          echo "=========================================="
