name: Validate Jobs One by One

on:
  schedule:
    - cron: '*/30 * * * *'  # Runs every 30 minutes
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of jobs to validate (empty = 1)'
        required: false
        default: '1'

jobs:
  validate-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commits!

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install -g puppeteer@latest

      - name: Create validation script
        run: |
          cat > validate_url.js << 'EOF'
          const puppeteer = require('puppeteer');

          async function validateUrl(url) {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            try {
              await page.goto(url, {timeout: 15000});
              await new Promise(r => setTimeout(r, 3000));
              const text = await page.evaluate(() => document.body.innerText);
              const expired = ['no longer available','expired','404','job filled','ocupat','închis','similar jobs','joburi similare']
                .some(i => text.toLowerCase().includes(i));
              await browser.close();
              return expired ? 'EXPIRED' : 'ACTIVE';
            } catch(e) {
              await browser.close();
              return 'ERROR: ' + e.message;
            }
          }

          async function main() {
            const url = process.argv[2];
            if (!url) {
              console.log('Usage: node validate_url.js <URL>');
              process.exit(1);
            }
            const result = await validateUrl(url);
            console.log(result);
          }

          main();
          EOF;

      - name: Get jobs without CIF
        id: get_jobs
        shell: bash
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then
            LIMIT=1
          fi;

          echo "Fetching up to $LIMIT jobs without CIF..."
          curl -g -s "https://solr.peviitor.ro/solr/job/select?q=*:*&fq=-cif:[*+TO+*]&sort=date+asc&fl=url,company,title&wt=json&rows=$LIMIT" \
            -u "$SOLR_AUTH" -o /tmp/jobs.json;

          echo "=== Solr Response ==="
          cat /tmp/jobs.json
          echo ""

          # Validate JSON
          if ! python3 -c "import sys,json;json.load(open('/tmp/jobs.json'))" 2>/dev/null; then
            echo "❌ Invalid JSON response from Solr"
            exit 1
          fi;

          NUM_FOUND=$(cat /tmp/jobs.json | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['response']['numFound'])")
          echo "Found $NUM_FOUND jobs without CIF"

          cat /tmp/jobs.json | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for i,doc in enumerate(d['response']['docs']):
              print(f'{i+1}. {doc.get("company","?")} - {doc.get("title","?")}')
          "

      - name: Process each job ONE BY ONE
        run: |
          cat /tmp/jobs.json | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          urls = [doc['url'] for doc in d['response']['docs']]
          print('\n'.join(urls))
          " > /tmp/urls.txt

          while read -r JOB_URL; do
            echo "=========================================="
            echo "Processing: $JOB_URL"
            echo "=========================================="

            # Step 1: Validate URL with Puppeteer
            echo "Test 1: tests/test_url.md - Validate URL..."
            RESULT=$(node validate_url.js "$JOB_URL")
            echo "Result: $RESULT"

            if [[ "$RESULT" == "EXPIRED" ]]; then
              echo "Job EXPIRED - Deleting..."
              curl -X POST "https://solr.peviitor.ro/solr/job/update?commit=true" \
                -u "$SOLR_AUTH" \
                -H "Content-Type: application/json" \
                -d "{\"delete\": [\"$JOB_URL\"]}"

              # Verify deletion (test_deleted_url.md)
              sleep 2
              VERIFY=$(curl -g -s "https://solr.peviitor.ro/solr/job/select?q=url:*$(basename $JOB_URL)*&fl=url&wt=json" \
                -u "$SOLR_AUTH" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['response']['numFound'])")
              if [ "$VERIFY" = "0" ]; then
                echo "✅ Deletion verified: URL no longer in Solr"
              else
                echo "❌ Deletion failed: URL still in Solr"
              fi
              continue
            fi

            if [[ "$RESULT" == ERROR* ]]; then
              echo "Error validating URL, skipping..."
              continue
            fi

            echo "Job ACTIVE - Running all tests..."

            # TODO: Run actual tests and FULL PUSH if needed
            echo "Tests to implement:"
            echo "  - tests/test_missing_fields.md"
            echo "  - tests/test_company.md"
            echo "  - tests/test_cif.md"
            echo "  - tests/test_salary.md"
            echo "  - tests/test_workmode.md"
            echo "  - tests/test_tags.md"
            echo "  - tests/test_location.md"
            echo "  - tests/test_status_vdate.md"
            echo "  - tests/test_expirationdate.md"

          done < /tmp/urls.txt

      - name: Commit and push changes (if any)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Validate jobs: Auto-update via GitHub Actions"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/sebiboga/peviitor-data-quality-guard.git main
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: /tmp/jobs.json
          retention-days: 7
