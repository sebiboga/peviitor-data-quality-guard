name: Validate Jobs One by One

on:
  schedule:
    - cron: '*/30 * * * *'  # Runs every 30 minutes
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of jobs to validate (empty = all without CIF)'
        required: false
        default: ''

jobs:
  validate-jobs:
    runs-on: ubuntu-latest
    env:
      SOLR_USER: ${{ secrets.SOLR_USER }}
      SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install -g puppeteer@latest

      - name: Create validation script
        run: |
          cat > validate_one_job.js << 'EOF'
          const puppeteer = require('puppeteer');

          async function validateUrl(url) {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            try {
              await page.goto(url, {timeout: 15000});
              await new Promise(r => setTimeout(r, 3000));
              const text = await page.evaluate(() => document.body.innerText);
              const expired = ['no longer available','expired','404','job filled','ocupat','închis']
                .some(i => text.toLowerCase().includes(i));
              await browser.close();
              return expired ? 'EXPIRED' : 'ACTIVE';
            } catch(e) {
              await browser.close();
              return 'ERROR: ' + e.message;
            }
          }

          async function main() {
            const url = process.argv[2];
            if (!url) {
              console.log('Usage: node validate_one_job.js <URL>');
              process.exit(1);
            }
            const result = await validateUrl(url);
            console.log(result);
          }

          main();
          EOF

      - name: Get jobs without CIF
        id: get_jobs
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then
            LIMIT=1
          fi

          curl -g -s "https://solr.peviitor.ro/solr/job/select?q=*:*&fq=-cif:[*+TO+*]&sort=date+asc&fl=url,company,title&wt=json&rows=$LIMIT" \
            -u "$SOLR_USER:$SOLR_PASSWD" > /tmp/jobs.json

          JOB_URL=$(cat /tmp/jobs.json | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d['response']['docs']:
              print(d['response']['docs'][0]['url'])
          ")
          echo "JOB_URL=$JOB_URL" >> $GITHUB_ENV
          echo "Found job: $JOB_URL"

      - name: Validate job URL with Puppeteer
        if: env.JOB_URL != ''
        run: |
          RESULT=$(node validate_one_job.js "$JOB_URL")
          echo "VALIDATION_RESULT=$RESULT" >> $GITHUB_ENV
          echo "URL validation: $RESULT"

      - name: Delete if EXPIRED
        if: env.VALIDATION_RESULT == 'EXPIRED'
        run: |
          curl -X POST "https://solr.peviitor.ro/solr/job/update?commit=true" \
            -u "$SOLR_USER:$SOLR_PASSWD" \
            -H "Content-Type: application/json" \
            -d "{\"delete\": [\"$JOB_URL\"]}"

          # Verify deletion (test_deleted_url.md)
          sleep 2
          VERIFY=$(curl -g -s "https://solr.peviitor.ro/solr/job/select?q=url:*$(basename $JOB_URL)*&fl=url&wt=json" \
            -u "$SOLR_USER:$SOLR_PASSWD" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['response']['numFound'])")
          if [ "$VERIFY" = "0" ]; then
            echo "✅ Deletion verified: URL no longer in Solr"
          else
            echo "❌ Deletion failed: URL still in Solr"
            exit 1
          fi

      - name: Run ALL tests for ACTIVE job
        if: env.VALIDATION_RESULT == 'ACTIVE'
        run: |
          echo "Running ALL tests for: $JOB_URL"
          echo "Tests to run:"
          echo "1. tests/test_url.md - URL validity"
          echo "2. tests/test_missing_fields.md - All 11 fields"
          echo "3. tests/test_company.md - UPPERCASE"  
          echo "4. tests/test_cif.md - Numeric CIF"
          echo "5. tests/test_salary.md - MIN-MAX RON format"
          echo "6. tests/test_workmode.md - remote/on-site/hybrid"
          echo "7. tests/test_tags.md - Max 10 tags"
          echo "8. tests/test_location.md - Romanian cities array"
          echo "9. tests/test_status_vdate.md - Valid status + ISO8601"
          echo "10. tests/test_expirationdate.md - Date + 30 days"
          echo ""
          echo "FULL PUSH required after tests if fields missing"
          echo "Process ONE BY ONE - never skip!"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: /tmp/jobs.json
          retention-days: 7
