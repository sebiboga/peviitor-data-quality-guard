name: Test Page 1 Validation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  prepare-page1:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get jobs from peviitor.ro API (Page 1)
        run: |
          curl -s "https://api.peviitor.ro/v1/search/?page=1" > /tmp/page1_jobs.json
          echo "Got $(cat /tmp/page1_jobs.json | python3 -c "import sys,json;print(len(json.load(sys.stdin))") jobs from page 1"
      
      - name: Create prompt
        run: |
          TODAY=$(date +%Y-%m-%d)
          cat > /tmp/prompt.txt << EOF
HEY OPENCODE!
Today: $TODAY
Jobs: /tmp/page1_jobs.json

FOR EACH JOB:
1. Read vdate from Solr (query by URL)
2. IF vdate starts with '$TODAY' → SKIP (don't test)
3. ELSE → TEST using tests/*.md

KEEP IT SIMPLE: Skip if vdate=$TODAY, test otherwise.
EOF
          cat /tmp/prompt.txt
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: page1-batch
          path: |
            /tmp/page1_jobs.json
            /tmp/prompt.txt
          retention-days: 7
